<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puneet's Quantum Command Center</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><radialGradient id='g' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='%2322d3ee'/><stop offset='100%' stop-color='%234f46e5'/></radialGradient><circle cx='50' cy='50' r='46' fill='url(%23g)' stroke='%23ffffff' stroke-width='4'/><text y='64' x='50' font-size='42' font-weight='900' font-family='system-ui,sans-serif' fill='%23ffffff' text-anchor='middle' letter-spacing='-2'>PS</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body {
      background: radial-gradient(circle at center, #0b071e 0%, #020106 100%);
      overflow-x: hidden;
    }
    /* Advanced Cyber Glassmorphism */
    .cyber-card {
      background: linear-gradient(135deg, rgba(16, 12, 42, 0.5) 0%, rgba(5, 3, 15, 0.7) 100%);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(99, 102, 241, 0.15);
      position: relative;
      overflow: hidden;
    }
    /* Moving Tech Accent Line */
    .cyber-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; hieght: 2px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, transparent);
      transition: all 0.6s ease;
    }
    .cyber-card:hover::before {
      left: 100%;
    }
    canvas {
      pointer-events: none;
    }
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center p-4 md:p-8 font-sans relative select-none">

  <canvas id="quantum-viewport" class="fixed top-0 left-0 w-full h-full z-0"></canvas>

  <div class="relative z-10 w-full max-w-5xl flex flex-col items-center">
    
    <header class="text-center my-8 max-w-xl w-full cyber-card p-6 rounded-2xl border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.1)] animate-fade-in">
      <div class="w-16 h-16 bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-600 rounded-full mx-auto mb-3 shadow-[0_0_40px_rgba(6,182,212,0.5)] flex items-center justify-center text-xl font-black tracking-widest border border-cyan-300/30 relative group">
        <span class="absolute inset-0 rounded-full bg-cyan-400/20 blur animate-ping"></span>
        <span class="relative z-10 text-white">PS</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-black tracking-tight bg-gradient-to-r from-white via-cyan-200 to-indigo-300 bg-clip-text text-transparent uppercase">
        Puneet's Mainframe
      </h1>
      <p class="text-cyan-400 text-[9px] font-bold tracking-[0.4em] mt-2 uppercase">Quantum Stream Terminal</p>
    </header>

    <main id="matrix-grid" class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 px-2">
      </main>

    <footer class="my-12 text-[9px] tracking-widest text-slate-600 uppercase">
      Grid Core Protocol &bull; Signal: <span class="text-cyan-400 font-bold animate-pulse">Synchronized</span>
    </footer>
  </div>

  <script>
    /* ==========================================
       1. DATABASE MATRIX CONFIGURATION
       ========================================== */
    async function initPipeline() {
      try {
        const response = await fetch('./db.json');
        const finalData = await response.json();

        const grid = document.getElementById('matrix-grid');
        grid.innerHTML = finalData.map(box => `
          <div class="cyber-card p-6 rounded-2xl shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
              <h2 class="text-xs font-black tracking-[0.2em] text-cyan-400 uppercase">${box.category}</h2>
              <span class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-pulse"></span>
            </div>
            <div class="space-y-3">
              ${box.links.map(link => `
                <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                   class="group block p-4 bg-slate-950/30 border border-white/5 rounded-xl transition-all duration-300 hover:-translate-y-1 hover:bg-indigo-950/20 hover:border-cyan-500/30 hover:shadow-[0_0_20px_rgba(6,182,212,0.15)]">
                  <div class="flex justify-between items-center">
                    <div>
                      <h3 class="font-bold text-slate-300 group-hover:text-white transition-colors duration-200">${link.name}</h3>
                      <p class="text-[11px] text-slate-400 mt-0.5 line-clamp-1 group-hover:text-slate-300">${link.desc}</p>
                    </div>
                    <div class="w-7 h-7 rounded-lg bg-white/5 border border-white/5 flex items-center justify-center text-slate-500 group-hover:border-cyan-500/30 group-hover:text-cyan-400 transition-all duration-300">
                      &nearr;
                    </div>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error("Pipeline failure:", err);
      }
    }
    document.addEventListener('DOMContentLoaded', initPipeline);

    /* ==========================================
       2. REALTIME THREE.JS QUANTUM VIEWPORT
       ========================================== */
    const canvas = document.getElementById('quantum-viewport');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Dynamic Reactive Spotlights
    const mouseLight = new THREE.PointLight(0x06b6d4, 4, 30);
    scene.add(mouseLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xa855f7, 2);
    keyLight.position.set(5, 5, 4);
    scene.add(keyLight);

    // Particle Matrix Engine (The Star Field)
    const particleCount = 180;
    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const initialZ = new Float32Array(particleCount); // Track original positions

    for(let i=0; i<particleCount*3; i+=3) {
      positions[i] = (Math.random() - 0.5) * 15;     // X Axis
      positions[i+1] = (Math.random() - 0.5) * 10;   // Y Axis
      positions[i+2] = (Math.random() - 0.5) * 5 - 2; // Z Axis
      initialZ[i/3] = positions[i+2];
    }
    
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMaterial = new THREE.PointsMaterial({
      color: 0x06b6d4,
      size: 0.04,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particleSystem);

    // Core Solid 3D Geometry Builds
    const cluster = [];
    const geometryInventory = [
      new THREE.TorusKnotGeometry(0.6, 0.2, 150, 16),
      new THREE.DodecahedronGeometry(0.8, 0),
      new THREE.IcosahedronGeometry(0.7, 1)
    ];
    const colorMatrix = [0x06b6d4, 0xa855f7, 0x6366f1];

    for (let i = 0; i < 8; i++) {
      const mat = new THREE.MeshStandardMaterial({
        color: colorMatrix[i % colorMatrix.length],
        metalness: 0.9,
        roughness: 0.1,
        wireframe: i % 2 === 0,
        transparent: true,
        opacity: 0.4
      });

      const mesh = new THREE.Mesh(geometryInventory[i % geometryInventory.length], mat);
      mesh.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 3 - 1);
      mesh.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.003, (Math.random() - 0.5) * 0.003, 0);
      mesh.spinX = (Math.random() - 0.5) * 0.005;
      mesh.spinY = (Math.random() - 0.5) * 0.005;
      
      scene.add(mesh);
      cluster.push(mesh);
    }

    camera.position.z = 5.5;

    // Fluid Mouse Physics Mapping
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;
    let lastMouseX = 0, lastMouseY = 0;
    let mouseSpeed = 0;

    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
      
      // Calculate instantaneous movement velocity
      let dx = mouseX - lastMouseX;
      let dy = mouseY - lastMouseY;
      mouseSpeed = Math.sqrt(dx*dx + dy*dy) * 15;
      
      lastMouseX = mouseX;
      lastMouseY = mouseY;
    });

    // Main Engine Frame Loop
    function renderFrame() {
      requestAnimationFrame(renderFrame);

      // Smooth coordinate interpolation
      targetX += (mouseX - targetX) * 0.07;
      targetY += (mouseY - targetY) * 0.07;
      mouseSpeed += (0 - mouseSpeed) * 0.05; // Decay velocity back to rest

      // Map glow light directly onto smooth coordinates
      mouseLight.position.set(targetX * 6, targetY * 4, 1.5);

      // Warp particle system based on speed metrics
      const positions = particleSystem.geometry.attributes.position.array;
      let index = 0;
      for(let i=0; i<particleCount; i++) {
        // Distort Z axis depth based on speed vectors to create "warp tunnel" look
        positions[index + 2] = initialZ[i] + (mouseSpeed * 0.3);
        // Slowly slide particles sideways based on mouse drift
        positions[index] += (targetX * 0.01 - positions[index] * 0.001) * 0.05;
        index += 3;
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;

      // Transform geometry clusters
      cluster.forEach((obj) => {
        obj.rotation.x += obj.spinX;
        obj.rotation.y += obj.spinY;
        
        // Float objects continuously through layout space
        obj.position.x += obj.velocity.x;
        obj.position.y += obj.velocity.y;

        // Boundary reflection bounds
        if (Math.abs(obj.position.x) > 6) obj.velocity.x *= -1;
        if (Math.abs(obj.position.y) > 4) obj.velocity.y *= -1;
      });

      // Camera drift matrix
      camera.position.x += (targetX * 0.5 - camera.position.x) * 0.05;
      camera.position.y += (targetY * 0.5 - camera.position.y) * 0.05;
      camera.lookAt(scene.position);

      renderer.render(scene, camera);
    }
    renderFrame();

    // Resize Matrices Handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
