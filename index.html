<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puneet's Animated Command Center</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { background: radial-gradient(circle at center, #0c0a20 0%, #03010a 100%); overflow-x: hidden; }
    .glass-card { background: rgba(13, 11, 34, 0.35); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    canvas { pointer-events: none; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center p-4 md:p-8 font-sans relative select-none">

  <canvas id="3d-viewport" class="fixed top-0 left-0 w-full h-full z-0"></canvas>

  <div class="relative z-10 w-full max-w-5xl flex flex-col items-center">
    <header class="text-center my-6 max-w-xl w-full glass-card p-6 rounded-2xl border border-indigo-500/20">
      <div class="w-16 h-16 bg-gradient-to-tr from-cyan-400 via-purple-500 to-emerald-400 rounded-full mx-auto mb-3 shadow-[0_0_40px_rgba(168,85,247,0.4)] flex items-center justify-center text-xl font-black border border-white/20">PS</div>
      <h1 class="text-3xl font-black bg-gradient-to-r from-white to-indigo-300 bg-clip-text text-transparent">Puneet's Launchpad</h1>
      <p class="text-purple-400 text-[10px] font-bold tracking-[0.3em] mt-1.5 uppercase">3D Matrix Link Hub</p>
    </header>

    <main id="matrix-grid" class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 px-2"></main>

    <footer class="my-10 text-[9px] tracking-widest text-slate-600 uppercase">
      System Framework Node v1.0.2 &bull; Status: <span class="text-emerald-400 font-bold animate-pulse">Online</span>
    </footer>
  </div>

  <script>
    // CORE SYNC ENGINE: Reads directly from the local db.json file in your repo
    async function loadDataPipeline() {
      try {
        const response = await fetch('./db.json');
        const finalData = await response.json();

        const grid = document.getElementById('matrix-grid');
        grid.innerHTML = finalData.map(box => `
          <div class="glass-card p-6 rounded-2xl border border-white/5">
            <h2 class="text-xs font-black tracking-widest text-indigo-400 uppercase mb-4">${box.category}</h2>
            <div class="space-y-3">
              ${box.links.map(link => `
                <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                   class="group block p-4 bg-slate-950/40 border border-slate-900 rounded-xl transition-all duration-300 hover:-translate-y-0.5 ${link.color}">
                  <div class="flex justify-between items-center">
                    <div>
                      <h3 class="font-bold text-slate-200 group-hover:text-white">${link.name}</h3>
                      <p class="text-[11px] text-slate-400 mt-0.5 line-clamp-1">${link.desc}</p>
                    </div>
                    <span class="text-slate-700 group-hover:text-purple-400 text-sm">&rarr;</span>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error("Database connection configuration failed:", err);
      }
    }
    document.addEventListener('DOMContentLoaded', loadDataPipeline);

    // THREE.JS VIEWPORT ENGINE
    const canvas = document.getElementById('3d-viewport');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const cursorLight = new THREE.PointLight(0xa855f7, 3, 25); scene.add(cursorLight);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.15); scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0x06b6d4, 1.5); directionalLight.position.set(1, 4, 5); scene.add(directionalLight);

    const meshInventory = [];
    const geometryTypes = [
      new THREE.TorusKnotGeometry(0.7, 0.22, 120, 16),
      new THREE.DodecahedronGeometry(0.9, 0),
      new THREE.IcosahedronGeometry(0.8, 1)
    ];
    const palette = [0x06b6d4, 0xa855f7, 0x10b981];

    for (let i = 0; i < 10; i++) {
      const mesh = new THREE.Mesh(geometryTypes[i % geometryTypes.length], new THREE.MeshStandardMaterial({
        color: palette[i % palette.length], metalness: 0.85, roughness: 0.15, wireframe: i % 2 === 0, transparent: true, opacity: 0.4
      }));
      mesh.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 4 - 1);
      mesh.spinX = (Math.random() - 0.5) * 0.006; mesh.spinY = (Math.random() - 0.5) * 0.006;
      scene.add(mesh); meshInventory.push(mesh);
    }
    camera.position.z = 6;

    let pointerX = 0, pointerY = 0, smoothX = 0, smoothY = 0;
    window.addEventListener('mousemove', (e) => {
      pointerX = (e.clientX / window.innerWidth) * 2 - 1; pointerY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      smoothX += (pointerX - smoothX) * 0.06; smoothY += (pointerY - smoothY) * 0.06;
      cursorLight.position.set(smoothX * 6, smoothY * 4, 2);
      meshInventory.forEach((obj, idx) => {
        obj.rotation.x += obj.spinX; obj.rotation.y += obj.spinY;
        obj.position.x += (smoothX * (idx * 0.1) - (obj.position.x * 0.01)) * 0.01;
        obj.position.y += (smoothY * (idx * 0.1) - (obj.position.y * 0.01)) * 0.01;
      });
      camera.position.x += (smoothX * 0.3 - camera.position.x) * 0.05; camera.position.y += (smoothY * 0.3 - camera.position.y) * 0.05;
      camera.lookAt(scene.position);
      renderer.render(scene, camera);
    }
    renderLoop();
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
